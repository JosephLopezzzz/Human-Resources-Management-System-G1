<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🧪 OTP Email Verification Test</h1>
    
    <div class="test-section">
        <h2>Step 1: Send OTP</h2>
        <input type="email" id="testEmail" placeholder="Enter test email" value="test@example.com">
        <button onclick="sendOTP()">Send OTP</button>
        <div id="sendResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Step 2: Verify OTP</h2>
        <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" maxlength="6">
        <button onclick="verifyOTP()">Verify OTP</button>
        <div id="verifyResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Step 3: Test Reset Link</h2>
        <div id="resetLink" class="result"></div>
        <button onclick="testResetLink()" id="testResetBtn" style="display:none;">Test Reset Link</button>
    </div>

    <div class="test-section">
        <h2>📋 Test Results Summary</h2>
        <div id="summary" class="result"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ormtnujhlrlghophotfr.supabase.co';
        let currentOTP = null;
        let testResults = [];

        function log(message, type = 'info') {
            console.log(`[OTP Test] ${message}`);
            testResults.push({ message, type, time: new Date().toLocaleTimeString() });
            updateSummary();
        }

        function showResult(elementId, message, isSuccess) {
            const element = document.getElementById(elementId);
            element.innerHTML = message;
            element.className = `result ${isSuccess ? 'success' : 'error'}`;
        }

        function updateSummary() {
            const summary = document.getElementById('summary');
            summary.innerHTML = testResults.map(r => 
                `<div style="color: ${r.type === 'error' ? '#721c24' : r.type === 'success' ? '#155724' : '#333'}">
                    [${r.time}] ${r.message}
                </div>`
            ).join('');
        }

        async function sendOTP() {
            const email = document.getElementById('testEmail').value;
            if (!email) {
                showResult('sendResult', 'Please enter an email', false);
                return;
            }

            log(`Sending OTP to ${email}...`);
            showResult('sendResult', 'Sending OTP...', true);

            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/admin-create-user/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();
                
                if (response.ok) {
                    log(`✅ OTP sent successfully!`);
                    if (result.otp) {
                        currentOTP = result.otp;
                        log(`🔢 Development OTP: ${result.otp} (check console logs in production)`);
                        showResult('sendResult', `✅ OTP sent! Development OTP: ${result.otp}`, true);
                    } else {
                        showResult('sendResult', '✅ OTP sent! Check your email.', true);
                    }
                } else {
                    log(`❌ Failed to send OTP: ${result.error}`, 'error');
                    showResult('sendResult', `❌ Failed: ${result.error}`, false);
                }
            } catch (error) {
                log(`❌ Network error: ${error.message}`, 'error');
                showResult('sendResult', `❌ Network error: ${error.message}`, false);
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otpCode').value;
            const email = document.getElementById('testEmail').value;

            if (!otp || !email) {
                showResult('verifyResult', 'Please enter email and OTP', false);
                return;
            }

            if (otp.length !== 6) {
                showResult('verifyResult', 'OTP must be 6 digits', false);
                return;
            }

            log(`Verifying OTP ${otp} for ${email}...`);
            showResult('verifyResult', 'Verifying OTP...', true);

            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/admin-create-user/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const result = await response.json();
                
                if (response.ok && result.resetLink) {
                    log(`✅ OTP verified successfully!`);
                    log(`🔗 Reset link generated: ${result.resetLink}`);
                    showResult('verifyResult', '✅ OTP verified! Reset link generated.', true);
                    showResult('resetLink', `🔗 <a href="${result.resetLink}" target="_blank">Click here to test password reset</a>`, true);
                    document.getElementById('testResetBtn').style.display = 'inline-block';
                } else {
                    log(`❌ OTP verification failed: ${result.error}`, 'error');
                    showResult('verifyResult', `❌ Verification failed: ${result.error}`, false);
                }
            } catch (error) {
                log(`❌ Network error: ${error.message}`, 'error');
                showResult('verifyResult', `❌ Network error: ${error.message}`, false);
            }
        }

        function testResetLink() {
            log('🧪 Opening reset link in new tab...');
            // The reset link should open in a new tab automatically
        }

        // Initialize
        log('🧪 OTP Test initialized');
        log('📝 Steps: 1) Send OTP, 2) Verify OTP, 3) Test reset link');
    </script>
</body>
</html>
