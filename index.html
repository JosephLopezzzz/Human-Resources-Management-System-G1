<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon1/bluepeak-favicon.jpg" />
    <!-- Application title / branding -->
    <title>BLUEPEAK HR Portal</title>
    <meta name="description" content="BLUEPEAK HR portal for employees, managers, and HR to manage payroll, attendance, and performance." />
    <meta name="author" content="Lovable" />

    <!-- Social sharing metadata -->
    <meta property="og:title" content="BLUEPEAK HR Portal" />
    <meta property="og:description" content="BLUEPEAK human resources and payroll management portal." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <style>
        #initial-loader {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          display: flex; flex-direction: column; justify-content: center; align-items: center;
          background-color: #f8fafc; z-index: 9999;
          font-family: 'IBM Plex Sans', system-ui, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
          #initial-loader { background-color: #020617; }
        }
        .spinner {
          width: 48px; height: 48px;
          border: 4px solid rgba(59, 130, 246, 0.2);
          border-radius: 50%; border-top-color: #3b82f6;
          animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
          margin-top: 16px; color: #64748b; font-size: 14px; font-weight: 500; letter-spacing: 0.05em;
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      </style>
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">INITIALIZING WORKSPACE...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
